name: Publish Scoop Manifest

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.5)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-scoop:
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"

    steps:
      - name: Determine release tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      # The Release workflow triggered by the same tag builds the assets;
      # wait for the one we need instead of racing it (fails after ~30 min).
      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          echo "Waiting for lstr-x86_64-pc-windows-msvc.zip on release $TAG..."
          for i in $(seq 1 40); do
            if gh release view "$TAG" --repo ${{ github.repository }} --json assets \
                 --jq '.assets[].name' 2>/dev/null | grep -qx "lstr-x86_64-pc-windows-msvc.zip"; then
              echo "Release asset found."
              exit 0
            fi
            sleep 45
          done
          echo "Timed out waiting for release asset lstr-x86_64-pc-windows-msvc.zip" >&2
          exit 1
      - name: Checkout Scoop bucket
        uses: actions/checkout@v7
        with:
          repository: bgreenwell/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Download release artifacts
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          VERSION="${TAG#v}"

          ZIP_FILE="lstr-x86_64-pc-windows-msvc.zip"
          SHA_FILE="${ZIP_FILE}.sha256"

          gh release download "$TAG" \
            --repo bgreenwell/lstr \
            --pattern "$ZIP_FILE" \
            --pattern "$SHA_FILE"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "SHA_FILE=$SHA_FILE" >> $GITHUB_ENV

      - name: Generate Scoop manifest
        run: |
          SHA256=$(cat "$SHA_FILE" | cut -d ' ' -f 1)
          DOWNLOAD_URL="https://github.com/bgreenwell/lstr/releases/download/v${VERSION}/${ZIP_FILE}"

          mkdir -p scoop-bucket/bucket

          jq -n \
            --arg version "${VERSION}" \
            --arg url "${DOWNLOAD_URL}" \
            --arg hash "${SHA256}" \
            '{
              version: $version,
              description: "Terminal document viewer for .docx files",
              homepage: "https://github.com/bgreenwell/lstr",
              license: "MIT",
              architecture: {
                "64bit": {
                  url: $url,
                  hash: $hash
                }
              },
              bin: "lstr.exe",
              checkver: {
                github: "https://github.com/bgreenwell/lstr"
              },
              autoupdate: {
                architecture: {
                  "64bit": {
                    url: "https://github.com/bgreenwell/lstr/releases/download/v$version/lstr-x86_64-pc-windows-msvc.zip"
                  }
                }
              }
            }' > scoop-bucket/bucket/lstr.json

      - name: Commit and push manifest
        working-directory: scoop-bucket
        run: |
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_EMAIL}"

          git add bucket/lstr.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "lstr ${VERSION}"
            git push
          fi
